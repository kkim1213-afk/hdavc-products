<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(주)현대에이브이씨 | 제품 카탈로그</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f7;color:#222}
/* 헤더 */
header{background:#111;color:#fff;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{background:#e94560;padding:3px 10px;border-radius:4px;font-weight:900;font-size:13px;letter-spacing:1px}
.logo-text{font-size:14px;font-weight:600;opacity:.85}
.header-right{font-size:12px;opacity:.5}
/* 히어로 */
.hero{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:48px 32px 40px;text-align:center}
.hero h1{font-size:26px;font-weight:800;margin-bottom:8px}
.hero p{font-size:14px;opacity:.7;margin-bottom:24px}
/* 검색 */
.search-wrap{max-width:500px;margin:0 auto 0;display:flex;gap:8px;padding:16px 20px;background:#fff;border-bottom:1px solid #eee}
.search-input{flex:1;padding:12px 18px;border:none;border-radius:10px;font-size:14px;outline:none}
.search-btn{background:#e94560;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;cursor:pointer;font-weight:600}
/* 카테고리 탭 */
.cat-bar{background:#fff;border-bottom:1px solid #eee;padding:0 24px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:60px;z-index:99}
.cat-btn{padding:14px 18px;border:none;background:none;font-size:13px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s}
.cat-btn.active{color:#e94560;font-weight:700;border-bottom-color:#e94560}
.cat-btn:hover{color:#e94560}
/* 메인 */
main{max-width:1200px;margin:0 auto;padding:28px 20px}
.section-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title span{background:#e94560;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600}
/* 그리드 */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:40px}
.prod-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;cursor:pointer;transition:.2s}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.prod-card.hidden{display:none}
.card-img{width:100%;height:150px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:36px;border-bottom:1px solid #f0f0f0}
.card-body{padding:14px}
.card-cat{font-size:10px;color:#e94560;font-weight:700;text-transform:uppercase;margin-bottom:4px}
.card-name{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-spec{font-size:11px;color:#888;margin-bottom:8px;line-height:1.5;height:32px;overflow:hidden}
.card-price{font-size:15px;font-weight:900;color:#111}
.card-price-sub{font-size:10px;color:#aaa;margin-top:2px}
.card-badge{display:inline-block;background:#fff3f5;color:#e94560;font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid #ffd0d8;margin-top:6px}
/* 섹션 구분선 */
.cat-section{margin-bottom:48px}
.cat-section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #e94560}
.cat-section-icon{font-size:24px}
.cat-section-title{font-size:18px;font-weight:800}
.cat-section-count{font-size:12px;color:#aaa}
/* 가격 없음 표시 */
.no-price{color:#bbb;font-size:13px}
/* 검색 결과 없음 */
.no-result{text-align:center;padding:60px;color:#aaa;font-size:15px;display:none}
footer{background:#111;color:#fff;padding:28px 32px;font-size:12px;opacity:.6;text-align:center;margin-top:40px}
</style>

<body>

<header>
  <div class="logo">
    <img id="logoImg" src="" alt="HDAVC" style="height:36px;object-fit:contain;display:none" onload="this.style.display='block';document.getElementById('logoFallback').style.display='none'">
    <span id="logoFallback" style="display:flex;align-items:center;gap:10px">
      <span class="logo-mark">HDAVC</span>
      <span class="logo-text">(주)현대에이브이씨 | 제품 카탈로그</span>
    </span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <input type="text" id="searchInput" placeholder="🔍 제품명 또는 모델명 검색..." oninput="doSearch()"
      style="padding:8px 16px;border:1.5px solid rgba(255,255,255,.2);border-radius:8px;font-size:13px;outline:none;background:rgba(255,255,255,.1);color:#fff;width:260px"

  </div>
</header>

<div class="hero" style="padding:0;position:relative;overflow:hidden">
  <div id="heroBanner" style="width:100%;height:280px;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="document.getElementById('bannerUpload').click()">

      <div style="font-size:11px;margin-top:4px">권장 사이즈: 1200 × 280px</div>
    </div>
  </div>
  <input type="file" id="bannerUpload" accept="image/*" style="display:none" onchange="setBanner(event)">
</div>

<div class="cat-bar" id="catBar">
  <button class="cat-btn active" onclick="filterCat('전체',this)">전체</button>
  <button class="cat-btn" onclick="filterCat('스피커',this)">🔊 스피커</button>
  <button class="cat-btn" onclick="filterCat('파워앰프',this)">⚡ 파워앰프</button>
  <button class="cat-btn" onclick="filterCat('믹서',this)">🎛 믹서</button>
  <button class="cat-btn" onclick="filterCat('마이크',this)">🎤 마이크</button>
  <button class="cat-btn" onclick="filterCat('케이블',this)">🔌 케이블</button>
  <button class="cat-btn" onclick="filterCat('스탠드',this)">🏗 스탠드</button>
  <button class="cat-btn" onclick="filterCat('전자드럼',this)">🥁 전자드럼</button>
</div>

<main>

  <div id="catalogWrap"></div>
</main>

let currentCat = '전체';
let searchTerm = '';

function priceFmt(p){return p.toLocaleString()+'원'}

function setBanner(e){
  const file = e.target.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  const banner = document.getElementById('heroBanner');
  banner.style.backgroundImage = `url(${url})`;
  banner.style.backgroundSize = 'cover';
  banner.style.backgroundPosition = 'center';
  banner.innerHTML = '';
}

function render(){
  const wrap = document.getElementById('catalogWrap');
  // 카테고리별 그룹화
  const cats = currentCat==='전체'
    ? [...new Set(products.map(p=>p.cat))]
    : [currentCat];

  let html = '';
  let totalVisible = 0;

  cats.forEach(cat=>{
    const catEmoji = {스피커:'🔊',파워앰프:'⚡',믹서:'🎛',마이크:'🎤',케이블:'🔌',스탠드:'🏗',전자드럼:'🥁'}[cat]||'📦';
    // 서브카테고리별 그룹
    const subs = [...new Set(products.filter(p=>p.cat===cat).map(p=>p.sub))];
    let catHtml = '';
    let catCount = 0;

    subs.forEach(sub=>{
      const items = products.filter(p=>p.cat===cat && p.sub===sub && matchSearch(p));
      if(!items.length) return;
      catCount += items.length;
      totalVisible += items.length;
      catHtml += `<div style="margin-bottom:24px">
        <div style="font-size:12px;font-weight:700;color:#888;margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">${sub} <span style="color:#bbb;font-weight:400">(${items.length})</span></div>
        <div class="product-grid">
          ${items.map(p=>`
            <div class="prod-card" onclick="${p.page?`location.href='${p.page}'`:''}">
              <div class="card-img">${p.icon}</div>
              <div class="card-body">
                <div class="card-cat">${p.brand}</div>
                <div class="card-name">${p.name}</div>
                <div class="card-spec">${p.spec}</div>
                <div class="card-price">${priceFmt(p.price)}<span style="font-size:11px;font-weight:400;color:#888"> / ${p.unit}</span></div>
                ${p.page?`<div class="card-badge">📋 상세페이지</div>`:''}
                ${p.badge?`<div class="card-badge" style="background:#f0f9ff;color:#0066cc;border-color:#b3d9f5">${p.badge}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });

    if(!catCount) return;
    html += `
      <div class="cat-section">
        <div class="cat-section-header">
          <span class="cat-section-icon">${catEmoji}</span>
          <span class="cat-section-title">${cat}</span>
          <span class="cat-section-count">${catCount}개 제품</span>
        </div>
        ${catHtml}
      </div>`;
  });

  wrap.innerHTML = html;
  document.getElementById('noResult').style.display = totalVisible===0?'block':'none';
}

function matchSearch(p){
  if(!searchTerm) return true;
  const q = searchTerm.toLowerCase();
  return p.name.toLowerCase().includes(q)||p.model.toLowerCase().includes(q)||p.brand.toLowerCase().includes(q)||p.spec.toLowerCase().includes(q);
}

function filterCat(cat,el){
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doSearch(){
  searchTerm = document.getElementById('searchInput').value;
  render();
}

render();
</script>

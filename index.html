<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>(주)현대에이브이씨 | 제품 카탈로그</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f5f5f7;color:#222}

/* 헤더 */
header{background:#fff;border-bottom:1px solid #eee;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px}
.logo a{display:flex;align-items:center;text-decoration:none}
.logo img{height:36px;object-fit:contain}
.search-box{display:flex;align-items:center;gap:8px}
.search-box input{padding:8px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#f5f5f7;color:#222;width:240px;transition:.2s}
.search-box input:focus{border-color:#e94560;background:#fff}

/* 필터 2줄 */
.filter-wrap{background:#fff;border-bottom:1px solid #eee;position:sticky;top:60px;z-index:98}
.filter-row{display:flex;align-items:center;gap:0}
.filter-label{font-size:11px;font-weight:700;color:#aaa;padding:0 12px;white-space:nowrap;min-width:52px}
.filter-scroll{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1}
.filter-scroll::-webkit-scrollbar{display:none}
.cat-btn{padding:10px 13px;border:none;background:none;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent;white-space:nowrap;transition:.2s;flex-shrink:0}
.cat-btn.active{color:#e94560;font-weight:700;border-bottom-color:#e94560}
.cat-btn:hover{color:#e94560}

/* ===== 브리핑 링크 배너 ===== */
.briefing-banner{
  background:linear-gradient(90deg,#0a0c10 0%,#111827 60%,#1a1f2e 100%);
  border-bottom:1px solid #1e2430;
  padding:0 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:48px;
  text-decoration:none;
  transition:background 0.2s;
  gap:12px;
  overflow:hidden;
  position:relative;
}
.briefing-banner::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:linear-gradient(180deg,#e8a020,#ff6b35);
}
.briefing-banner:hover{
  background:linear-gradient(90deg,#0f1117 0%,#151c2a 60%,#1e2438 100%);
}
.briefing-banner-left{
  display:flex;
  align-items:center;
  gap:10px;
  flex:1;
  min-width:0;
}
.briefing-live-dot{
  width:6px;height:6px;
  background:#e8a020;
  border-radius:50%;
  flex-shrink:0;
  animation:blink 2s infinite;
}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0.3;}
}
.briefing-tag{
  font-size:10px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  color:#e8a020;
  background:rgba(232,160,32,0.12);
  border:1px solid rgba(232,160,32,0.25);
  padding:2px 7px;border-radius:2px;
  flex-shrink:0;
}
.briefing-text{
  font-size:12px;color:#c8ccd6;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.briefing-text strong{color:#fff;font-weight:700;}
.briefing-arrow{
  font-size:13px;color:#e8a020;
  flex-shrink:0;
  transition:transform 0.2s;
}
.briefing-banner:hover .briefing-arrow{transform:translateX(3px);}

/* 히어로 배너 */
.hero-banner{width:100%;height:240px;background:linear-gradient(135deg,#1a1a2e,#0f3460);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;position:relative}
.hero-banner img{width:100%;height:100%;object-fit:cover;display:none}
.banner-placeholder{text-align:center;color:rgba(255,255,255,.4);pointer-events:none}
.banner-placeholder div:first-child{font-size:36px;margin-bottom:8px}
.banner-placeholder div{font-size:13px}
.banner-placeholder div:last-child{font-size:11px;margin-top:4px}

/* 메인 */
main{max-width:1200px;margin:0 auto;padding:24px 16px}

/* 제품 그리드 */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:32px}
.prod-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;cursor:pointer;transition:.2s}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.card-img{width:100%;height:140px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:32px;border-bottom:1px solid #f0f0f0}
.card-body{padding:12px}
.card-cat{font-size:10px;color:#e94560;font-weight:700;text-transform:uppercase;margin-bottom:3px}
.card-name{font-size:13px;font-weight:700;margin-bottom:4px;line-height:1.3}
.card-spec{font-size:11px;color:#888;margin-bottom:8px;line-height:1.5;height:30px;overflow:hidden}
.card-price{font-size:14px;font-weight:900;color:#111}
.card-badge{display:inline-block;background:#fff3f5;color:#e94560;font-size:10px;padding:2px 7px;border-radius:10px;border:1px solid #ffd0d8;margin-top:5px}
.card-badge.blue{background:#f0f9ff;color:#0066cc;border-color:#b3d9f5}

/* 섹션 */
.cat-section{margin-bottom:44px}
.cat-section-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid #e94560}
.cat-section-icon{font-size:22px}
.cat-section-title{font-size:17px;font-weight:800}
.cat-section-count{font-size:12px;color:#aaa}
.sub-label{font-size:11px;font-weight:700;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.sub-count{color:#bbb;font-weight:400}
.sub-group{margin-bottom:22px}

/* 검색 결과 없음 */
.no-result{text-align:center;padding:60px;color:#aaa;font-size:15px;display:none}

footer{background:#111;color:#fff;padding:24px 20px;font-size:11px;opacity:.6;text-align:center;margin-top:40px;line-height:1.8}

/* ===== 반응형 ===== */
@media(max-width:768px){
  header{padding:0 16px;height:56px}
  .logo img{height:30px}
  .search-box input{width:180px;font-size:12px}
  .cat-btn{padding:11px 12px;font-size:12px}
  .product-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .card-img{height:120px;font-size:28px}
  .card-body{padding:10px}
  .card-name{font-size:12px}
  .hero-banner{height:180px}
  main{padding:18px 12px}
  .briefing-banner{padding:0 16px;height:44px}
}
@media(max-width:480px){
  header{padding:0 12px;height:52px;gap:8px}
  .logo img{height:26px}
  .search-box input{width:140px;font-size:12px;padding:7px 10px}
  .cat-btn{padding:10px 10px;font-size:11px}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .card-img{height:110px;font-size:26px}
  .card-body{padding:9px}
  .card-name{font-size:12px}
  .card-price{font-size:13px}
  .hero-banner{height:140px}
  .cat-section-title{font-size:15px}
  main{padding:14px 10px}
  .cat-section-header{margin-bottom:14px}
  .briefing-banner{padding:0 12px;height:42px}
  .briefing-tag{display:none}
  .briefing-text{font-size:11px}
}
@media(max-width:360px){
  .search-box input{width:110px}
  .product-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .card-img{height:95px}
}
</style>

let currentCat='전체', currentBrand='전체', searchTerm='';

function priceFmt(p){return p.toLocaleString()+'원'}

function render(){
  const wrap=document.getElementById('catalogWrap');
  const cats=currentCat==='전체'?[...new Set(products.map(p=>p.cat))]:[currentCat];
  const emoji={스피커:'🔊',파워앰프:'⚡',믹서:'🎛',마이크:'🎤',케이블:'🔌',스탠드:'🏗',전자드럼:'🥁'};
  let html='', total=0;

  cats.forEach(cat=>{
    const subs=[...new Set(products.filter(p=>p.cat===cat).map(p=>p.sub))];
    let catHtml='', catCnt=0;
    subs.forEach(sub=>{
      const items=products.filter(p=>p.cat===cat&&p.sub===sub&&match(p));
      if(!items.length) return;
      catCnt+=items.length; total+=items.length;
      catHtml+=`<div class="sub-group">
        <div class="sub-label">${sub} <span class="sub-count">(${items.length})</span></div>
        <div class="product-grid">
          ${items.map(p=>`
            <div class="prod-card" onclick="${p.page?`location.href='${p.page}'`:''}">
              <div class="card-img">${p.img ? `<img src="${p.img}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;padding:8px" onerror="this.parentElement.innerHTML='${p.icon}'">` : p.icon}</div>
              <div class="card-body">
                <div class="card-cat">${p.brand}</div>
                <div class="card-name">${p.name}</div>
                <div class="card-spec">${p.spec}</div>
                <div class="card-price">${p.inquiry ? `<span style="color:#e94560;font-weight:900;font-size:14px">견적문의</span>` : `${priceFmt(p.price)}<span style="font-size:10px;font-weight:400;color:#888"> / ${p.unit}</span>`}</div>
                ${p.page?`<div class="card-badge">📋 상세페이지</div>`:''}
                ${p.badge?`<div class="card-badge blue">${p.badge}</div>`:''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    });
    if(!catCnt) return;
    html+=`<div class="cat-section">
      <div class="cat-section-header">
        <span class="cat-section-icon">${emoji[cat]||'📦'}</span>
        <span class="cat-section-title">${cat}</span>
        <span class="cat-section-count">${catCnt}개 제품</span>
      </div>${catHtml}
    </div>`;
  });

  wrap.innerHTML=html;
  document.getElementById('noResult').style.display=total===0?'block':'none';
}

function match(p){
  if(currentBrand!=='전체' && p.brand!==currentBrand) return false;
  if(!searchTerm) return true;
  const q=searchTerm.toLowerCase();
  return [p.name,p.model,p.brand,p.spec].some(v=>v.toLowerCase().includes(q));
}

function filterCat(cat,el){
  currentCat=cat;
  document.querySelectorAll('[id^="cat-"]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterBrand(brand,el){
  currentBrand=brand;
  document.querySelectorAll('[id^="brand-"]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function doSearch(){
  searchTerm=document.getElementById('searchInput').value;
  render();
}

function setBanner(e){
  const file=e.target.files[0];
  if(!file) return;
  const url=URL.createObjectURL(file);
  const img=document.getElementById('bannerImg');
  img.src=url; img.style.display='block';
  document.getElementById('bannerPlaceholder').style.display='none';
  document.getElementById('heroBanner').style.cursor='default';
  document.getElementById('heroBanner').onclick=null;
}

window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (q) {
    document.getElementById('searchInput').value = q;
    searchTerm = q;
  }
  render();
});

// DOMContentLoaded 시에도 render 호출 (load 이벤트 지연 방지)
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', render);
} else {
  render();
}
</script>
